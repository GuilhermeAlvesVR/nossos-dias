<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosso Álbum</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f8f0f6 0%, #fdf7fb 100%);
      color: #d18ec9;
      margin: 0;
      padding: 0;
    }

    .page-wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 16px 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .back-btn {
      text-decoration: none;
      color: #7a6f6a;
      font-size: 0.98rem;
      background: rgba(255,255,255,0.75);
      padding: 10px 16px;
      border-radius: 999px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .back-btn:hover {
      color: #4d4541;
    }

    .album-title {
      width: 100%;
      text-align: center;
      margin: 10px 0 18px;
    }

    .album-title h1 {
      margin: 0;
      color: #ff66b2;
      font-size: 2.6em;
    }

    .album-title p {
      margin: 10px 0 0;
      color: #9d6f97;
      font-size: 1rem;
    }

    .book-shell {
      perspective: 2000px;
      margin: 0 auto;
      max-width: 1050px;
    }

    .book {
      position: relative;
      background:
        linear-gradient(90deg,
          #efe8dd 0%,
          #fbf8f2 12%,
          #fffdf8 47%,
          #ece4d7 49.5%,
          #d9cfc2 50%,
          #ece4d7 50.5%,
          #fffdf8 53%,
          #fbf8f2 88%,
          #efe8dd 100%);
      border-radius: 18px;
      padding: 24px 26px 18px;
      box-shadow:
        0 20px 45px rgba(0, 0, 0, 0.14),
        inset 0 0 0 1px rgba(120, 96, 78, 0.09);
      overflow: hidden;
      min-height: 580px;
    }

    .book::before {
      content: "";
      position: absolute;
      top: 18px;
      bottom: 18px;
      left: 50%;
      width: 10px;
      transform: translateX(-50%);
      background: linear-gradient(
        180deg,
        rgba(90, 70, 55, 0.12),
        rgba(255,255,255,0.72),
        rgba(90, 70, 55, 0.12)
      );
      border-radius: 999px;
      box-shadow:
        inset 0 0 6px rgba(0, 0, 0, 0.06),
        0 0 10px rgba(255, 255, 255, 0.4);
      pointer-events: none;
    }

    .page-stage {
      position: relative;
      min-height: 500px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .book-spread {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 34px;
      width: 100%;
      align-items: start;
    }

    .book-spread.turn-next {
      animation: spreadNext 0.7s ease;
    }

    .book-spread.turn-prev {
      animation: spreadPrev 0.7s ease;
    }

    @keyframes spreadNext {
      0% {
        opacity: 0;
        transform: rotateY(-16deg) translateX(24px) scale(0.985);
      }
      100% {
        opacity: 1;
        transform: rotateY(0deg) translateX(0) scale(1);
      }
    }

    @keyframes spreadPrev {
      0% {
        opacity: 0;
        transform: rotateY(16deg) translateX(-24px) scale(0.985);
      }
      100% {
        opacity: 1;
        transform: rotateY(0deg) translateX(0) scale(1);
      }
    }

    .album-page {
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(170, 150, 130, 0.12);
      border-radius: 8px;
      padding: 18px 18px 12px;
      min-height: 460px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
    }

    .page-pattern-stack,
    .page-pattern-mix {
      display: grid;
      gap: 16px;
      align-content: start;
      align-items: start;
    }

    .page-pattern-stack {
      grid-template-rows: auto auto;
    }

    .page-pattern-mix {
      grid-template-rows: auto auto;
    }

    .bottom-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: start;
    }

    .photo-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-width: 0;
    }

    .photo-frame {
      width: 100%;
      background: #fbfbf9;
      padding: 8px 8px 10px;
      border: 1px solid rgba(160, 145, 130, 0.16);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.06);
      border-radius: 3px;
    }

    .photo-img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      cursor: pointer;
      background: #ece7e2;
    }

    .photo-card.large .photo-img {
      aspect-ratio: 4 / 2.7;
    }

    .photo-card.small .photo-img {
      aspect-ratio: 1 / 1;
    }

    .photo-caption {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #7a6f6a;
      text-align: center;
      font-weight: 400;
      line-height: 1.4;
      min-height: 1.2em;
      width: 100%;
    }

    .photo-date {
      margin-top: 3px;
      font-size: 0.74rem;
      color: #9a8f88;
      text-align: center;
      line-height: 1.3;
      width: 100%;
    }

    .photo-remove {
      margin-top: 6px;
      background: transparent;
      border: none;
      color: #c9beb7;
      font-size: 0.74rem;
      cursor: pointer;
      padding: 4px 8px;
    }

    .photo-remove:hover {
      color: #8f837c;
    }

    .album-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .album-btn {
      background: transparent;
      color: #5f554f;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      padding: 6px 10px;
    }

    .album-btn:hover:not(:disabled) {
      color: #2f2a27;
    }

    .album-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .page-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 90px;
    }

    .page-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d7cec7;
      border: none;
      padding: 0;
      cursor: pointer;
    }

    .page-dot.active {
      background: #9e9188;
    }

    .empty-message {
      color: #8e7f79;
      font-style: italic;
      margin: 40px 0;
      text-align: center;
    }

    .add-memory {
      background-color: rgba(255,255,255,0.82);
      padding: 22px;
      margin: 30px auto 0;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
      text-align: left;
      max-width: 1050px;
    }

    .add-memory h2 {
      text-align: center;
      color: #ff66b2;
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 1.9em;
    }

    .add-memory label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      color: #d18ec9;
      font-weight: bold;
      font-size: 1.02em;
    }

    .add-memory input,
    .add-memory textarea {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #e8d9e2;
      font-size: 1em;
      background: #fffdfd;
    }

    .add-memory textarea {
      resize: vertical;
      min-height: 110px;
    }

    .save-btn {
      margin-top: 16px;
      padding: 13px 20px;
      background-color: #ff66b2;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1em;
      width: 100%;
    }

    .save-btn:hover {
      background-color: #e55a94;
    }

    .preview-container {
      margin-top: 16px;
      text-align: center;
    }

    .preview-container img {
      max-width: 240px;
      max-height: 240px;
      border-radius: 12px;
      display: none;
      margin: 0 auto;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 9999;
    }

    .modal.open {
      display: flex;
    }

    .modal-content {
      max-width: 92vw;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .modal img {
      max-width: 100%;
      max-height: 75vh;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    .modal-info {
      background: white;
      color: #7a6f6a;
      padding: 12px 16px;
      border-radius: 14px;
      text-align: center;
      max-width: 700px;
      width: 100%;
    }

    .modal-date {
      color: #9a8f88;
      font-size: 0.85rem;
      margin-top: 6px;
    }

    .modal-actions {
      margin-top: 10px;
    }

    .modal-remove-btn {
      background: transparent;
      border: none;
      color: #b6aaa3;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .modal-remove-btn:hover {
      color: #7a6f6a;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: white;
      color: #7a6f6a;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 1.3em;
      cursor: pointer;
      font-weight: bold;
    }

    @media (max-width: 920px) {
      .book {
        background: #f7f3ec;
        padding: 16px 14px 14px;
        min-height: auto;
      }

      .book::before {
        display: none;
      }

      .page-stage {
        min-height: auto;
      }

      .book-spread {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .album-page {
        min-height: auto;
        padding: 14px 14px 10px;
      }

      .page-pattern-stack,
      .page-pattern-mix {
        gap: 12px;
      }

      .bottom-pair {
        gap: 12px;
      }
    }

    @media (max-width: 700px) {
      .page-wrap {
        padding-top: 50px;
      }

      .album-title h1 {
        font-size: 2.1em;
      }

      .album-title p {
        font-size: 0.96rem;
      }

      .album-controls {
        gap: 12px;
      }

      .album-btn {
        font-size: 0.95rem;
      }
    }

    @media (max-width: 520px) {
      .photo-caption {
        font-size: 0.8rem;
      }

      .photo-date {
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="topbar">
      <a class="back-btn" href="index.html">← Voltar</a>
    </div>

    <div class="album-title">
      <h1>Nosso Álbum</h1>
      <p>Um lugar só para guardar nossos momentos mais especiais.</p>
    </div>

    <div class="book-shell">
      <div class="book">
        <div class="page-stage" id="memories-list"></div>
      </div>
    </div>

    <div class="album-controls">
      <button class="album-btn" id="prev-btn">← Anterior</button>
      <div class="page-dots" id="page-dots"></div>
      <button class="album-btn" id="next-btn">Próxima →</button>
    </div>

    <section class="add-memory">
      <h2>Adicionar nova memória</h2>

      <label for="memory-date">Data:</label>
      <input type="date" id="memory-date" required>

      <label for="memory-caption">Legenda:</label>
      <textarea id="memory-caption" placeholder="Escreva uma legenda para esse momento..." required></textarea>

      <label for="memory-image">Foto:</label>
      <input type="file" id="memory-image" accept="image/*" required>

      <div class="preview-container">
        <img id="image-preview" alt="Prévia da foto">
      </div>

      <button class="save-btn" id="add-memory-btn">Adicionar memória</button>
    </section>
  </div>

  <div class="modal" id="image-modal">
    <button class="modal-close" id="modal-close">×</button>
    <div class="modal-content">
      <img id="modal-image" alt="Foto ampliada">
      <div class="modal-info">
        <div id="modal-caption"></div>
        <div class="modal-date" id="modal-date"></div>
        <div class="modal-actions">
          <button class="modal-remove-btn" id="modal-remove-btn">Remover</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCEtGOJ0Il1C7tXe3CVz4QSvCU7wA_74NI",
      authDomain: "nosso-amor-1f3e8.firebaseapp.com",
      projectId: "nosso-amor-1f3e8",
      storageBucket: "nosso-amor-1f3e8.appspot.com",
      messagingSenderId: "380207057106",
      appId: "1:380207057106:web:f2150d96af4018bc7d050b",
      measurementId: "G-Z3DHV04CHB",
      databaseURL: "https://nosso-amor-1f3e8-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const memoriesRef = ref(database, "memories");

    const memoryDateInput = document.getElementById("memory-date");
    const memoryCaptionInput = document.getElementById("memory-caption");
    const memoryImageInput = document.getElementById("memory-image");
    const addMemoryBtn = document.getElementById("add-memory-btn");
    const imagePreview = document.getElementById("image-preview");

    const memoriesList = document.getElementById("memories-list");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const pageDots = document.getElementById("page-dots");

    const imageModal = document.getElementById("image-modal");
    const modalImage = document.getElementById("modal-image");
    const modalCaption = document.getElementById("modal-caption");
    const modalDate = document.getElementById("modal-date");
    const modalClose = document.getElementById("modal-close");
    const modalRemoveBtn = document.getElementById("modal-remove-btn");

    let selectedImageBase64 = "";
    let allMemories = [];
    let currentSpread = 0;
    let animationDirection = "";
    let currentModalMemoryId = null;

    function formatDate(dateString) {
      return new Date(dateString).toLocaleDateString("pt-BR");
    }

    function getSpreadSize() {
      return window.innerWidth <= 920 ? 2 : 5;
    }

    function splitIntoSpreads(memories) {
      const spreadSize = getSpreadSize();
      const spreads = [];

      for (let i = 0; i < memories.length; i += spreadSize) {
        spreads.push(memories.slice(i, i + spreadSize));
      }

      return spreads;
    }

    function openModal(memory) {
      currentModalMemoryId = memory.id;
      modalImage.src = memory.image;
      modalCaption.textContent = memory.caption?.trim() || "";
      modalDate.textContent = formatDate(memory.date);
      imageModal.classList.add("open");
    }

    function closeModal() {
      imageModal.classList.remove("open");
      modalImage.src = "";
      currentModalMemoryId = null;
    }

    function createPhotoCard(memory, size = "large") {
      const caption = memory.caption?.trim() || "";
      const card = document.createElement("article");
      card.className = `photo-card ${size}`;

      card.innerHTML = `
        <div class="photo-frame">
          <img src="${memory.image}" alt="Memória especial" class="photo-img">
        </div>
        <div class="photo-caption">${caption || "&nbsp;"}</div>
        <div class="photo-date">${formatDate(memory.date)}</div>
      `;

      card.querySelector(".photo-img").addEventListener("click", () => {
        openModal(memory);
      });

      return card;
    }

    function buildStackPage(items) {
      const page = document.createElement("div");
      page.className = "album-page";

      const pattern = document.createElement("div");
      pattern.className = "page-pattern-stack";

      items.slice(0, 2).forEach(item => {
        pattern.appendChild(createPhotoCard(item, "large"));
      });

      page.appendChild(pattern);
      return page;
    }

    function buildMixPage(items) {
      const page = document.createElement("div");
      page.className = "album-page";

      const pattern = document.createElement("div");
      pattern.className = "page-pattern-mix";

      if (items[0]) {
        pattern.appendChild(createPhotoCard(items[0], "large"));
      }

      const bottomPair = document.createElement("div");
      bottomPair.className = "bottom-pair";

      if (items[1]) {
        bottomPair.appendChild(createPhotoCard(items[1], "small"));
      }

      if (items[2]) {
        bottomPair.appendChild(createPhotoCard(items[2], "small"));
      }

      if (items[1] || items[2]) {
        pattern.appendChild(bottomPair);
      }

      page.appendChild(pattern);
      return page;
    }

    function renderDots(total) {
      pageDots.innerHTML = "";

      for (let i = 0; i < total; i++) {
        const dot = document.createElement("button");
        dot.className = `page-dot ${i === currentSpread ? "active" : ""}`;
        dot.setAttribute("aria-label", `Ir para página ${i + 1}`);

        dot.addEventListener("click", () => {
          if (i === currentSpread) return;
          animationDirection = i > currentSpread ? "turn-next" : "turn-prev";
          currentSpread = i;
          renderAlbum();
        dot.addEventListener("click", () => {
          if (i === currentSpread) return;
          animationDirection = i > currentSpread ? "turn-next" : "turn-prev";
          currentSpread = i;
          renderAlbum();
        });
      

        pageDots.appendChild(dot);
      }
    }

function renderAlbum() {
  memoriesList.innerHTML = "";

  if (!allMemories.length) {
    memoriesList.innerHTML = `<p class="empty-message">Nenhuma memória adicionada ainda. 💖</p>`;
    pageDots.innerHTML = "";
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  }

  const spreads = splitIntoSpreads(allMemories);

  if (currentSpread > spreads.length - 1) {
    currentSpread = Math.max(0, spreads.length - 1);
  }

  const spreadItems = spreads[currentSpread];

  const spread = document.createElement("div");
  spread.className = "book-spread";

  // 🔥 aplica animação só quando precisa
  if (animationDirection) {
    spread.classList.add(animationDirection);
  }

  // layout
  if (window.innerWidth <= 920) {
    spread.appendChild(buildStackPage(spreadItems));
  } else {
    const leftItems = spreadItems.slice(0, 2);
    const rightItems = spreadItems.slice(2, 5);

    spread.appendChild(buildStackPage(leftItems));

    if (rightItems.length) {
      spread.appendChild(buildMixPage(rightItems));
    } else {
      const emptyPage = document.createElement("div");
      emptyPage.className = "album-page";
      spread.appendChild(emptyPage);
    }
  }

  // 🚨 ESSENCIAL (isso tava faltando)
  memoriesList.appendChild(spread);

  // evita piscar
  animationDirection = "";

  prevBtn.disabled = currentSpread === 0;
  nextBtn.disabled = currentSpread === spreads.length - 1;

  renderDots(spreads.length);
}

    modalClose.addEventListener("click", closeModal);

    imageModal.addEventListener("click", (e) => {
      if (e.target === imageModal) {
        closeModal();
      }
    });

    modalRemoveBtn.addEventListener("click", async () => {
      if (!currentModalMemoryId) return;

      const confirmDelete = confirm("Tem certeza que deseja excluir essa memória?");
      if (!confirmDelete) return;

      try {
        await remove(ref(database, `memories/${currentModalMemoryId}`));
        closeModal();
      } catch (err) {
        console.error("Erro ao excluir memória:", err);
        alert("Não consegui excluir essa memória.");
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
      if (e.key === "ArrowRight") nextBtn.click();
      if (e.key === "ArrowLeft") prevBtn.click();
    });

    prevBtn.addEventListener("click", () => {
      if (currentSpread > 0) {
        currentSpread--;
        animationDirection = "turn-prev";
        renderAlbum();
      }
    });

    nextBtn.addEventListener("click", () => {
      const totalSpreads = splitIntoSpreads(allMemories).length;

      if (currentSpread < totalSpreads - 1) {
        currentSpread++;
        animationDirection = "turn-next";
        renderAlbum();
      }
    });

    let lastIsMobile = window.innerWidth <= 920;

    window.addEventListener("resize", () => {
      const nowIsMobile = window.innerWidth <= 920;

      if (nowIsMobile !== lastIsMobile) {
        lastIsMobile = nowIsMobile;
        renderAlbum();
      }
    });

    memoryImageInput.addEventListener("change", () => {
      const file = memoryImageInput.files[0];

      if (!file) {
        selectedImageBase64 = "";
        imagePreview.style.display = "none";
        imagePreview.src = "";
        return;
      }

      if (!file.type.startsWith("image/")) {
        alert("Selecione um arquivo de imagem válido.");
        memoryImageInput.value = "";
        selectedImageBase64 = "";
        imagePreview.style.display = "none";
        imagePreview.src = "";
        return;
      }

      const reader = new FileReader();

      reader.onload = function (e) {
        selectedImageBase64 = e.target.result;
        imagePreview.src = selectedImageBase64;
        imagePreview.style.display = "block";
      };

      reader.readAsDataURL(file);
    });

    addMemoryBtn.addEventListener("click", async () => {
      const date = memoryDateInput.value;
      const caption = memoryCaptionInput.value.trim();

      if (!date || !caption || !selectedImageBase64) {
        alert("Preencha a data, a legenda e escolha uma foto.");
        return;
      }

      const file = memoryImageInput.files[0];
      if (file && file.size > 1024 * 1024 * 2) {
        alert("Escolha uma imagem com até 2MB.");
        return;
      }

      const adjustedDate = new Date(date + "T00:00:00-03:00");

      try {
        await push(memoriesRef, {
          date: adjustedDate.toISOString(),
          caption,
          image: selectedImageBase64
        });

        memoryDateInput.value = "";
        memoryCaptionInput.value = "";
        memoryImageInput.value = "";
        selectedImageBase64 = "";
        imagePreview.src = "";
        imagePreview.style.display = "none";
      } catch (err) {
        console.error("Erro ao salvar memória:", err);
        alert("Não consegui salvar a memória. Veja o console (F12).");
      }
    });

    onValue(
      memoriesRef,
      (snapshot) => {
        const data = snapshot.val();
        const memories = data
          ? Object.keys(data).map(key => ({ id: key, ...data[key] }))
          : [];

        memories.sort((a, b) => new Date(a.date) - new Date(b.date));
        allMemories = memories;
        animationDirection = "";
        renderAlbum();
      },
      (err) => {
        console.error("Erro ao carregar memórias:", err);
        alert("Não consegui carregar as memórias. Veja o console (F12).");
      }
    );
  </script>
</body>
</html>
