<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosso Amor</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      text-align: center;
      background: linear-gradient(180deg, #f8f0f6 0%, #fdf7fb 100%);
      color: #d18ec9;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin: 36px 0 10px;
      font-size: 3em;
      color: #ff66b2;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    h1 span {
      font-size: 1.2em;
    }

    .texto-especial {
      font-size: 1.3em;
      font-style: italic;
      margin: 10px auto 26px;
      color: #ff3399;
      padding: 0 18px;
      max-width: 820px;
      line-height: 1.4;
    }

    .contador-label {
      font-size: 1.1em;
      color: #c48bb9;
      margin-bottom: 10px;
    }

    .contador {
      font-size: 2.3em;
      margin: 0 auto 34px;
      color: #ff007f;
      font-weight: bold;
      padding: 0 16px;
      line-height: 1.2;
      max-width: 900px;
    }

    .memories {
      margin: 30px auto 0;
      padding: 0 16px;
      max-width: 1120px;
    }

    .memories h2 {
      font-size: 2.4em;
      color: #ff66b2;
      margin: 0 0 22px;
    }

    .book-shell {
      perspective: 1600px;
      margin: 0 auto;
      max-width: 980px;
    }

    .book {
      position: relative;
      background: linear-gradient(90deg, #f6efe5 0%, #fffaf2 48%, #f6efe5 50%, #fffaf2 52%, #f6efe5 100%);
      border-radius: 24px;
      padding: 34px 28px 26px;
      min-height: 540px;
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.10),
        inset 0 0 0 1px rgba(160, 120, 90, 0.08);
      overflow: hidden;
    }

    .book::before {
      content: "";
      position: absolute;
      top: 22px;
      bottom: 22px;
      left: 50%;
      width: 6px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(120, 90, 70, 0.14), rgba(255,255,255,0.5), rgba(120, 90, 70, 0.14));
      box-shadow: inset 0 0 6px rgba(0,0,0,0.05);
      pointer-events: none;
    }

    .page-stage {
      position: relative;
      min-height: 420px;
    }

    .page {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      width: 100%;
      opacity: 1;
      transform-origin: left center;
      backface-visibility: hidden;
    }

    .page.turn-next {
      animation: turnNext 0.65s ease;
    }

    .page.turn-prev {
      animation: turnPrev 0.65s ease;
    }

    @keyframes turnNext {
      0% {
        opacity: 0;
        transform: rotateY(-22deg) translateX(30px) scale(0.98);
      }
      100% {
        opacity: 1;
        transform: rotateY(0deg) translateX(0) scale(1);
      }
    }

    @keyframes turnPrev {
      0% {
        opacity: 0;
        transform: rotateY(22deg) translateX(-30px) scale(0.98);
      }
      100% {
        opacity: 1;
        transform: rotateY(0deg) translateX(0) scale(1);
      }
    }

    .memory-photo {
      background: #fff;
      border-radius: 10px;
      padding: 12px 12px 14px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.10);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100%;
    }

    .memory-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 4px;
      display: block;
      cursor: pointer;
      background: #eee;
    }

    .memory-date {
      margin-top: 12px;
      font-size: 1em;
      font-weight: bold;
      color: #ff3399;
    }

    .memory-caption {
      margin-top: 8px;
      font-size: 1em;
      line-height: 1.35;
      color: #9d6f97;
      word-break: break-word;
      min-height: 54px;
    }

    .memory-actions {
      margin-top: auto;
      padding-top: 10px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .delete-btn {
      background: transparent;
      color: #c48bb9;
      border: none;
      font-size: 0.92em;
      cursor: pointer;
      padding: 6px 10px;
    }

    .delete-btn:hover {
      color: #ff007f;
    }

    .book-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .book-btn {
      background: #ff66b2;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 1em;
      cursor: pointer;
      min-width: 140px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .book-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      background: #eb4fa1;
    }

    .book-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .page-indicator {
      font-weight: bold;
      color: #b06ba5;
      min-width: 110px;
    }

    .empty-message {
      color: #b85c9e;
      font-style: italic;
      margin: 30px 0 10px;
    }

    .add-memory {
      background-color: #fff;
      padding: 22px;
      margin: 34px auto 0;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
      text-align: left;
      max-width: 980px;
    }

    .add-memory h3 {
      text-align: center;
      color: #ff66b2;
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 2em;
    }

    .add-memory label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      color: #d18ec9;
      font-weight: bold;
      font-size: 1.05em;
    }

    .add-memory input,
    .add-memory textarea {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #e8d9e2;
      font-size: 1em;
      box-sizing: border-box;
      background: #fffdfd;
    }

    .add-memory textarea {
      resize: vertical;
      min-height: 110px;
    }

    .add-memory button {
      margin-top: 16px;
      padding: 13px 20px;
      background-color: #ff66b2;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1em;
      width: 100%;
    }

    .add-memory button:hover {
      background-color: #e55a94;
    }

    .preview-container {
      margin-top: 16px;
      text-align: center;
    }

    .preview-container img {
      max-width: 240px;
      max-height: 240px;
      border-radius: 12px;
      display: none;
      margin: 0 auto;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 9999;
    }

    .modal.open {
      display: flex;
    }

    .modal-content {
      max-width: 92vw;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .modal img {
      max-width: 100%;
      max-height: 75vh;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    .modal-info {
      background: white;
      color: #b85c9e;
      padding: 12px 16px;
      border-radius: 14px;
      text-align: center;
      max-width: 700px;
      width: 100%;
    }

    .modal-date {
      color: #ff3399;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: white;
      color: #ff3399;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 1.3em;
      cursor: pointer;
      font-weight: bold;
    }

    footer {
      font-size: 1.15em;
      margin: 46px 0 30px;
      color: #ff3399;
      padding: 0 16px;
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: repeat(2, 1fr);
      }

      .book {
        min-height: 500px;
      }

      .book::before {
        display: none;
      }
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 2.2em;
        margin-top: 68px;
      }

      .texto-especial {
        font-size: 1.05em;
        margin-top: 8px;
      }

      .contador {
        font-size: 1.8em;
      }

      .memories h2 {
        font-size: 2em;
      }

      .book {
        padding: 18px 14px 18px;
        min-height: 440px;
      }

      .page {
        gap: 14px;
      }

      .memory-caption {
        min-height: 46px;
        font-size: 0.95em;
      }

      .book-btn {
        min-width: 122px;
        padding: 10px 16px;
      }
    }

    @media (max-width: 520px) {
      .memories,
      .add-memory {
        padding-left: 12px;
        padding-right: 12px;
      }

      .page {
        grid-template-columns: repeat(2, 1fr);
      }

      .memory-photo {
        padding: 10px 10px 12px;
      }

      .memory-date {
        font-size: 0.92em;
      }

      .memory-caption {
        font-size: 0.9em;
      }

      .contador {
        font-size: 1.55em;
      }
    }
  </style>
</head>
<body>
  <h1>
    <span>❤</span> Nosso Amor <span>❤</span>
  </h1>

  <p class="texto-especial">"Cada dia ao seu lado é um presente que quero guardar para sempre no meu coração."</p>

  <div class="contador-label">Estamos juntos há:</div>
  <div class="contador" id="contador"></div>

  <section class="memories">
    <h2>Nosso Livro</h2>

    <div class="book-shell">
      <div class="book">
        <div class="page-stage">
          <div id="memories-list"></div>
        </div>
      </div>
    </div>

    <div class="book-controls">
      <button class="book-btn" id="prev-btn">← Anterior</button>
      <span class="page-indicator" id="page-indicator">Página 1 de 1</span>
      <button class="book-btn" id="next-btn">Próxima →</button>
    </div>
  </section>

  <section class="add-memory">
    <h3>Adicionar nova memória</h3>

    <label for="memory-date">Data:</label>
    <input type="date" id="memory-date" required>

    <label for="memory-caption">Legenda:</label>
    <textarea id="memory-caption" placeholder="Escreva uma legenda para esse momento..." required></textarea>

    <label for="memory-image">Foto:</label>
    <input type="file" id="memory-image" accept="image/*" required>

    <div class="preview-container">
      <img id="image-preview" alt="Prévia da foto">
    </div>

    <button id="add-memory-btn">Adicionar memória</button>
  </section>

  <div class="modal" id="image-modal">
    <button class="modal-close" id="modal-close">×</button>
    <div class="modal-content">
      <img id="modal-image" alt="Foto ampliada">
      <div class="modal-info">
        <div class="modal-date" id="modal-date"></div>
        <div id="modal-caption"></div>
      </div>
    </div>
  </div>

  <footer>Com muito amor, de mim para você! 💖</footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCEtGOJ0Il1C7tXe3CVz4QSvCU7wA_74NI",
      authDomain: "nosso-amor-1f3e8.firebaseapp.com",
      projectId: "nosso-amor-1f3e8",
      storageBucket: "nosso-amor-1f3e8.appspot.com",
      messagingSenderId: "380207057106",
      appId: "1:380207057106:web:f2150d96af4018bc7d050b",
      measurementId: "G-Z3DHV04CHB",
      databaseURL: "https://nosso-amor-1f3e8-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    const startDate = new Date("2024-10-19T00:00:00-03:00");
    const memoriesRef = ref(database, "memories");

    const memoryDateInput = document.getElementById("memory-date");
    const memoryCaptionInput = document.getElementById("memory-caption");
    const memoryImageInput = document.getElementById("memory-image");
    const addMemoryBtn = document.getElementById("add-memory-btn");
    const imagePreview = document.getElementById("image-preview");
    const memoriesList = document.getElementById("memories-list");

    const imageModal = document.getElementById("image-modal");
    const modalImage = document.getElementById("modal-image");
    const modalDate = document.getElementById("modal-date");
    const modalCaption = document.getElementById("modal-caption");
    const modalClose = document.getElementById("modal-close");

    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const pageIndicator = document.getElementById("page-indicator");

    let selectedImageBase64 = "";
    let allMemories = [];
    let currentPage = 0;
    let animationDirection = "turn-next";

    function atualizaContador() {
      const agora = new Date();
      const diff = agora - startDate;

      const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
      const horas = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

      document.getElementById("contador").innerText =
        `${dias} dias e ${horas} horas`;
    }

    atualizaContador();
    setInterval(atualizaContador, 60000);

    function formatDate(dateString) {
      return new Date(dateString).toLocaleDateString("pt-BR");
    }

    function getItemsPerPage() {
      return window.innerWidth <= 900 ? 2 : 3;
    }

    function getPages(memories) {
      const itemsPerPage = getItemsPerPage();
      const pages = [];

      for (let i = 0; i < memories.length; i += itemsPerPage) {
        pages.push(memories.slice(i, i + itemsPerPage));
      }

      return pages;
    }

    function updatePaginationControls(totalPages) {
      pageIndicator.textContent = totalPages === 0
        ? "Página 0 de 0"
        : `Página ${currentPage + 1} de ${totalPages}`;

      prevBtn.disabled = currentPage <= 0;
      nextBtn.disabled = currentPage >= totalPages - 1 || totalPages === 0;
    }

    function openModal(image, date, caption) {
      modalImage.src = image;
      modalDate.textContent = formatDate(date);
      modalCaption.textContent = caption;
      imageModal.classList.add("open");
    }

    function closeModal() {
      imageModal.classList.remove("open");
      modalImage.src = "";
    }

    function renderMemories() {
      memoriesList.innerHTML = "";

      if (!allMemories.length) {
        memoriesList.innerHTML = `<p class="empty-message">Nenhuma memória adicionada ainda. 💖</p>`;
        updatePaginationControls(0);
        return;
      }

      const pages = getPages(allMemories);

      if (currentPage > pages.length - 1) {
        currentPage = Math.max(0, pages.length - 1);
      }

      const currentMemories = pages[currentPage];

      const page = document.createElement("div");
      page.className = `page ${animationDirection}`;

      currentMemories.forEach(memory => {
        const card = document.createElement("article");
        card.className = "memory-photo";
        card.setAttribute("data-id", memory.id);

        card.innerHTML = `
          <img src="${memory.image}" alt="Memória especial" class="memory-img">
          <div class="memory-date">${formatDate(memory.date)}</div>
          <div class="memory-caption">${memory.caption}</div>
          <div class="memory-actions">
            <button class="delete-btn">Excluir</button>
          </div>
        `;

        card.querySelector(".memory-img").addEventListener("click", () => {
          openModal(memory.image, memory.date, memory.caption);
        });

        card.querySelector(".delete-btn").addEventListener("click", async () => {
          const confirmDelete = confirm("Tem certeza que deseja excluir essa memória?");
          if (!confirmDelete) return;

          try {
            await remove(ref(database, `memories/${memory.id}`));
          } catch (err) {
            console.error("Erro ao excluir memória:", err);
            alert("Não consegui excluir a memória.");
          }
        });

        page.appendChild(card);
      });

      memoriesList.appendChild(page);
      updatePaginationControls(pages.length);
    }

    modalClose.addEventListener("click", closeModal);

    imageModal.addEventListener("click", (e) => {
      if (e.target === imageModal) {
        closeModal();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
      if (e.key === "ArrowRight") nextBtn.click();
      if (e.key === "ArrowLeft") prevBtn.click();
    });

    prevBtn.addEventListener("click", () => {
      if (currentPage > 0) {
        currentPage--;
        animationDirection = "turn-prev";
        renderMemories();
      }
    });

    nextBtn.addEventListener("click", () => {
      const totalPages = getPages(allMemories).length;
      if (currentPage < totalPages - 1) {
        currentPage++;
        animationDirection = "turn-next";
        renderMemories();
      }
    });

    window.addEventListener("resize", () => {
      renderMemories();
    });

    memoryImageInput.addEventListener("change", () => {
      const file = memoryImageInput.files[0];

      if (!file) {
        selectedImageBase64 = "";
        imagePreview.style.display = "none";
        imagePreview.src = "";
        return;
      }

      if (!file.type.startsWith("image/")) {
        alert("Selecione um arquivo de imagem válido.");
        memoryImageInput.value = "";
        selectedImageBase64 = "";
        imagePreview.style.display = "none";
        imagePreview.src = "";
        return;
      }

      const reader = new FileReader();

      reader.onload = function (e) {
        selectedImageBase64 = e.target.result;
        imagePreview.src = selectedImageBase64;
        imagePreview.style.display = "block";
      };

      reader.readAsDataURL(file);
    });

    addMemoryBtn.addEventListener("click", async () => {
      const date = memoryDateInput.value;
      const caption = memoryCaptionInput.value.trim();

      if (!date || !caption || !selectedImageBase64) {
        alert("Preencha a data, a legenda e escolha uma foto.");
        return;
      }

      const file = memoryImageInput.files[0];
      if (file && file.size > 1024 * 1024 * 2) {
        alert("Escolha uma imagem com até 2MB.");
        return;
      }

      const adjustedDate = new Date(date + "T00:00:00-03:00");

      try {
        await push(memoriesRef, {
          date: adjustedDate.toISOString(),
          caption,
          image: selectedImageBase64
        });

        memoryDateInput.value = "";
        memoryCaptionInput.value = "";
        memoryImageInput.value = "";
        selectedImageBase64 = "";
        imagePreview.src = "";
        imagePreview.style.display = "none";
      } catch (err) {
        console.error("Erro ao salvar memória:", err);
        alert("Não consegui salvar a memória. Veja o console (F12).");
      }
    });

    onValue(
      memoriesRef,
      (snapshot) => {
        const data = snapshot.val();
        const memories = data
          ? Object.keys(data).map(key => ({ id: key, ...data[key] }))
          : [];

        memories.sort((a, b) => new Date(a.date) - new Date(b.date));
        allMemories = memories;
        renderMemories();
      },
      (err) => {
        console.error("Erro ao carregar memórias:", err);
        alert("Não consegui carregar as memórias. Veja o console (F12).");
      }
    );
  </script>
</body>
</html>
