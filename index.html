<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nosso Amor</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(180deg, #f8f0f6 0%, #fdf7fb 100%);
      color: #d18ec9;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    h1 {
      margin: 30px 0 10px;
      font-size: 3em;
      color: #ff66b2;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1 span {
      font-size: 1.2em;
    }

    .texto-especial {
      font-size: 1.3em;
      font-style: italic;
      margin: 14px auto 28px;
      color: #ff3399;
      line-height: 1.5;
      max-width: 760px;
    }

    .contador-label {
      font-size: 1.1em;
      color: #c48bb9;
      margin-bottom: 10px;
    }

    .contador {
      font-size: 2.3em;
      color: #ff007f;
      font-weight: bold;
      line-height: 1.2;
      margin-bottom: 34px;
    }

    .album-call {
      background: rgba(255, 255, 255, 0.75);
      max-width: 700px;
      margin: 0 auto;
      padding: 30px 22px;
      border-radius: 24px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
    }

    .album-call h2 {
      margin: 0 0 12px;
      font-size: 2em;
      color: #ff66b2;
    }

    .album-call p {
      margin: 0 0 24px;
      color: #9d6f97;
      font-size: 1.05em;
      line-height: 1.5;
    }

    .album-btn {
      display: inline-block;
      text-decoration: none;
      background-color: #ff66b2;
      color: white;
      padding: 14px 26px;
      border-radius: 999px;
      font-size: 1em;
      font-weight: bold;
      transition: transform 0.15s ease, background-color 0.15s ease;
    }

    .album-btn:hover {
      background-color: #e55a94;
      transform: translateY(-1px);
    }

    footer {
      font-size: 1.1em;
      margin-top: 50px;
      color: #ff3399;
    }

    @media (max-width: 700px) {
      .container {
        padding-top: 55px;
      }

      h1 {
        font-size: 2.2em;
      }

      .texto-especial {
        font-size: 1.05em;
      }

      .contador {
        font-size: 1.75em;
      }

      .album-call h2 {
        font-size: 1.7em;
      }
    }

    @media (max-width: 480px) {
      .contador {
        font-size: 1.5em;
      }

      .album-call {
        padding: 24px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <span>❤</span> Nosso Amor <span>❤</span>
    </h1>

    <p class="texto-especial">
      "Cada dia ao seu lado é um presente que quero guardar para sempre no meu coração."
    </p>

    <div class="contador-label">Estamos juntos há:</div>
    <div class="contador" id="contador"></div>

    <section class="album-call">
      <h2>Nosso Álbum</h2>
      <p>
        Guardei aqui nossos momentos mais especiais, em um cantinho só nosso.
      </p>
      <a class="album-btn" href="album.html">Abrir nosso álbum</a>
    </section>

    <footer>Com muito amor, de mim para você! 💖</footer>
  </div>

  <script>
    const startDate = new Date("2024-10-19T00:00:00-03:00");

    function atualizaContador() {
      const agora = new Date();
      const diff = agora - startDate;

      const dias = Math.floor(diff / (1000 * 60 * 60 * 24));

      document.getElementById("contador").innerText = `${dias} dias`;
    }

    atualizaContador();
    setInterval(atualizaContador, 60000);
  </script>
</body>
</html>
